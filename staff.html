<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QMS — Staff Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F4F1EC;--surface:#FFF;--border:#E2DDD6;--text:#1A1714;--sub:#5C5753;--muted:#9E9890;
    --accent:#C8502A;--accent-light:#FDF0EB;
    --wa:#25D366;--wa-light:#E8FFF1;--wa-dark:#128C7E;
    --shadow:0 2px 12px rgba(26,23,20,.08);--shadow-lg:0 8px 32px rgba(26,23,20,.12);--radius:14px}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;box-shadow:var(--shadow)}
  .logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px}.logo span{color:var(--accent)}
  .nav-links{display:flex;gap:6px}
  .nav-link{padding:6px 15px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);cursor:pointer;text-decoration:none;color:var(--sub);background:transparent;transition:all .18s;font-family:'Outfit',sans-serif}
  .nav-link:hover{background:var(--bg)}.nav-link.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .nav-right{display:flex;gap:14px;align-items:center}
  .nav-stat{text-align:center;font-size:11px;color:var(--muted)}.nav-stat .val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;display:block}
  #ws-status{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;border:1px solid transparent}
  .page{max-width:680px;margin:0 auto;padding:36px 32px;padding-top:88px}
  .eyebrow{font-size:10px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:4px}
  .page-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:28px}
  .section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:14px;font-family:'Syne',sans-serif}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow)}
  .mb-16{margin-bottom:16px}.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}.gap-10{gap:10px}.mt-16{margin-top:16px}.hidden{display:none!important}
  .action-btn{padding:9px 22px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;font-family:'Outfit',sans-serif;border:none;transition:all .18s}
  .call-btn{width:100%;padding:16px;border-radius:10px;font-size:15px;font-weight:800;border:none;cursor:pointer;transition:all .2s;letter-spacing:.5px;text-transform:uppercase;font-family:'Syne',sans-serif;color:#fff;margin-bottom:16px;background:var(--accent)}
  .call-btn:disabled{cursor:not-allowed;background:var(--border)!important;color:var(--muted)!important;box-shadow:none!important}
  .wa-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:9px;background:var(--wa-light);border:1px solid #25D36630;font-size:12px;color:var(--wa-dark);margin-bottom:14px}
  .wa-msg-link{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:8px;background:var(--wa-light);color:var(--wa-dark);text-decoration:none;font-weight:700;border:1px solid #25D36630;white-space:nowrap}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  @media(max-width:600px){.page{padding:24px 16px;padding-top:80px}}
</style>
</head>
<body>
<nav>
  <div class="logo">QMS</div>
  <div class="nav-links">
    <a class="nav-link" href="admin.html">Admin</a>
    <a class="nav-link" href="display.html">Display Board</a>
    <span class="nav-link active">Staff Counter</span>
  </div>
  <div class="nav-right">
    <div id="ws-status">Connecting…</div>
    <div class="nav-stat" style="color:var(--accent)"><span class="val" id="nav-dine">0</span>Waiting</div>
  </div>
</nav>

<div class="page">
  <div class="eyebrow">Staff Terminal</div>
  <div class="page-title">Counter View</div>

  <!-- Currently Serving -->
  <div class="card mb-16">
    <div class="section-label">Currently Serving</div>
    <div id="staff-current-empty" style="font-size:17px;color:var(--muted);font-weight:600;padding:8px 0">No ticket in service</div>
    <div id="staff-current-info" class="hidden">
      <div style="font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;line-height:1;margin-bottom:6px;color:var(--accent)" id="staff-current-num">—</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:14px" id="staff-current-meta"></div>
      <div id="staff-wa-bar" class="wa-bar hidden">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <span id="staff-wa-phone"></span>
        <a id="staff-wa-link" href="#" target="_blank" rel="noopener" class="wa-msg-link">Message</a>
      </div>
      <div class="flex gap-10 mt-16">
        <button class="action-btn" style="background:#FDF6E3;color:#A07830" onclick="recallCurrent()">Recall</button>
        <button class="action-btn" style="background:#FEF2F2;color:#DC2626" onclick="skipCurrent()">Skip / No Show</button>
      </div>
    </div>
  </div>

  <!-- Call Ticket -->
  <div class="card mb-16">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="section-label" style="margin-bottom:0">Queue — Dine In</div>
      <div style="font-size:11px;color:var(--muted)" id="staff-queue-meta"></div>
    </div>
    <button class="call-btn" id="call-btn" onclick="callNext()" disabled>Queue Empty</button>
    <div id="staff-queue-preview"></div>
  </div>

  <!-- Recent WA -->
  <div class="card hidden" id="staff-wa-recent">
    <div class="section-label">Recent WhatsApp Activity</div>
    <div id="staff-wa-recent-list"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
function render() {
  const q   = state.queues.dine;
  const cur = state.serving;

  document.getElementById('nav-dine').textContent = q.length;
  document.getElementById('staff-current-empty').classList.toggle('hidden', !!cur);
  document.getElementById('staff-current-info').classList.toggle('hidden', !cur);

  if (cur) {
    document.getElementById('staff-current-num').textContent  = cur.number;
    document.getElementById('staff-current-meta').textContent = 'Dine In · ' + cur.pax + ' pax · ' + new Date(cur.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const waBar = document.getElementById('staff-wa-bar');
    if (cur.phone) {
      waBar.classList.remove('hidden');
      document.getElementById('staff-wa-phone').textContent = cur.phone;
      document.getElementById('staff-wa-link').href = buildWALink(cur.phone, 'Hi! Your queue number *' + cur.number + '* at *' + state.restaurantName + '* is now being served.');
    } else {
      waBar.classList.add('hidden');
    }
  }

  const btn = document.getElementById('call-btn');
  if (q.length > 0) {
    btn.disabled        = false;
    btn.textContent     = '↑ Call Next — ' + q[0].number;
    btn.style.background = 'var(--accent)';
    btn.style.boxShadow  = '0 4px 14px #C8502A44';
  } else {
    btn.disabled        = true;
    btn.textContent     = 'Queue Empty';
    btn.style.background = '';
    btn.style.boxShadow  = 'none';
  }

  document.getElementById('staff-queue-meta').textContent = state.waitSettings.dine + 'min avg · ' + state.activeCounters + ' counter';

  const preview = document.getElementById('staff-queue-preview');
  if (q.length === 0) {
    preview.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:10px">No tickets in queue</div>';
  } else {
    preview.innerHTML = q.map(function(t, i) {
      const w       = estimateWait(i, state.activeCounters, state.waitSettings.dine);
      const isFirst = i === 0;
      const bg      = isFirst ? 'var(--accent-light)' : 'var(--bg)';
      const border  = isFirst ? '1.5px solid #C8502A55' : '1.5px solid transparent';
      const leftBdr = isFirst ? '3px solid var(--accent)' : '3px solid var(--border)';
      const numCol  = isFirst ? 'var(--accent)' : 'var(--sub)';
      const btnBg   = isFirst ? 'var(--accent)' : 'transparent';
      const btnCol  = isFirst ? '#fff' : 'var(--accent)';
      const badge   = isFirst ? '<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:var(--accent);color:#fff;font-weight:700;letter-spacing:1px;text-transform:uppercase">Next</span>' : '';
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:8px;background:' + bg + ';border:' + border + ';border-left:' + leftBdr + '">'
        + '<div style="display:flex;align-items:center;gap:10px">'
        + '<span style="font-family:\'JetBrains Mono\',monospace;font-weight:700;font-size:15px;color:' + numCol + '">' + t.number + '</span>'
        + badge + (t.phone ? WA_SVG : '')
        + '<span style="font-size:12px;color:var(--muted)">' + t.pax + ' pax · ~' + w + 'm</span>'
        + '</div>'
        + '<button onclick="callSpecific(' + t.id + ',\'dine\')" style="padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;border:1.5px solid var(--accent);background:' + btnBg + ';color:' + btnCol + ';cursor:pointer;font-family:\'Outfit\',sans-serif">Call</button>'
        + '</div>';
    }).join('');
  }

  const waSect = document.getElementById('staff-wa-recent');
  const waList = document.getElementById('staff-wa-recent-list');
  const recent = state.waLog.slice(0, 3);
  if (recent.length > 0) {
    waSect.classList.remove('hidden');
    const tm = {issued:{color:'#2A7A6F',lbl:'Issued'}, called:{color:'#C8502A',lbl:'Called'}, upcoming:{color:'#C8502A',lbl:'Up Next'}, recall:{color:'#A07830',lbl:'Recall'}};
    waList.innerHTML = recent.map(function(e) {
      const t = tm[e.type] || {color:'#999', lbl:e.type};
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg);margin-bottom:7px">'
        + WA_SVG
        + '<span style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:700">' + e.ticket + '</span>'
        + '<span class="badge" style="background:' + t.color + '18;color:' + t.color + '">' + t.lbl + '</span>'
        + '<span style="font-size:11px;color:var(--muted);margin-left:auto">' + e.phone + '</span>'
        + '<a href="' + e.link + '" target="_blank" rel="noopener" style="font-size:11px;color:var(--wa-dark);text-decoration:none;font-weight:700">Open</a>'
        + '</div>';
    }).join('');
  } else {
    waSect.classList.add('hidden');
  }
}
</script>
</body>
</html>
